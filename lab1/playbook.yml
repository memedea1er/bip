- name: Установка Nginx, Docker и Docker Compose на Ubuntu
  hosts: webservers
  become: true

  tasks:
    - name: Обновить кэш apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Установить необходимые пакеты для добавления репо
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Добавить GPG ключ Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Добавить репозиторий Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Установить Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Запустить и включить Docker сервис
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Установить плагин Docker Compose
      apt:
        name: docker-compose-plugin
        state: present

    - name: Установить Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Запустить и включить Nginx сервис
      systemd:
        name: nginx
        state: started
        enabled: yes
